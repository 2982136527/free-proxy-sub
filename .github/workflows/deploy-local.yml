name: Deploy Local (G2532) to Pages
on:
  push:
    branches: [main]
    paths:
      - 'dist/local/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist/
          retention-days: 1
      - uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages
